{% extends "base_auth.html" %}

{% block content %}

<div class="auth-container">
    <form class="auth-form" method="POST" action="/login">
        <div class="auth-box">
            <div class="circle"></div>
            <h2>BIENVENIDO</h2>

            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}

            <label>Correo electrónico</label>
            <input type="email" name="correo" placeholder="correo@email.com" required>

            <label>Contraseña</label>
            <input type="password" name="contrasena" placeholder="********" required>

            <a href="#" class="forgot-link">Olvidé mi contraseña</a>
        </div>

        <div class="auth-actions">
            <button type="submit" class="btn-alt">ENTRAR</button>
            <a href="/register" class="btn-alt">REGISTRARSE</a>
        </div>
    </form>
</div>

{% endblock %}
