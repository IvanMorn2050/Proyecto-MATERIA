<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>

<div class="layout">

    <aside>
        <div class="avatar"></div>
        <a href="/catalogo">Catálogo</a>
        <a href="/pedidos">Mis pedidos</a>
        <a href="/carrito">Carrito</a>
        <a href="/detalle">Detalle</a>
    </aside>

    <main>
        <header>
            <form method="GET" action="/catalogo">
                <input type="search" name="buscar" placeholder="Buscar..." class="search-box"
                    value="{{ request.query_params.get('buscar', '') }}">
            </form>
        </header>

        <section>
            {% block content %}{% endblock %}
        </section>
    </main>

</div>

</body>
</html>
